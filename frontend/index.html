<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Corafone Voice UI</title>

<!-- Tailwind CSS via CDN (JIT build, no build step required) -->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css" />
</head>

<body class="bg-white text-black min-h-screen flex items-center justify-center font-sans antialiased overflow-x-hidden">

  <!-- Ambient background glow -->
  <div class="pointer-events-none fixed inset-0 flex items-center justify-center">
    <div class="w-[36rem] h-[36rem] bg-[var(--periwinkle-tint)] rounded-full blur-3xl"></div>
  </div>

  <main class="relative w-full max-w-sm mx-auto flex flex-col items-center gap-6 px-6 py-6">


    <!-- Account picker: pick which demo account to call as (hidden when
         deep-linked from the dashboard's call modal -- that already shows
         who's being called, so this would just be a redundant repeat). -->
    <div id="accountPickerSection" class="w-full space-y-2">
      <p class="text-xs text-neutral-500 text-center">Pick an account to call</p>
      <div id="accountRow" class="w-full flex flex-col gap-2 max-h-56 overflow-y-auto pr-1">
        <p class="text-xs text-neutral-500 text-center py-2">Loading accounts…</p>
      </div>
    </div>

    <!-- Status + Timer -->
    <div class="flex flex-col items-center gap-2">
      <div id="statusPill" class="flex items-center gap-2 px-4 py-1.5 rounded-full bg-neutral-900 border border-neutral-800 text-sm text-neutral-400 transition-colors duration-300">
        <span id="statusDot" class="w-2 h-2 rounded-full bg-neutral-600 transition-colors duration-300"></span>
        <span id="statusText">Disconnected</span>
      </div>
      <div id="timer" class="text-2xl font-mono tabular-nums text-black tracking-wider" style="font-variant-numeric: tabular-nums;">00:00</div>
    </div>

    <!-- Mic Button + call circle -->
    <div class="relative flex items-center justify-center w-44 h-44">
      <!-- Always-on, dim ambient circle: the resting state before/between calls. -->
      <div class="absolute inset-0 rounded-full overflow-hidden">
        <div class="absolute inset-[-25%] call-gradient call-gradient-idle"></div>
      </div>

      <!-- Animated rings: app.js toggles the "hidden" class on these two ids
           whenever a call is live -- id and that toggle behavior are untouched,
           only their visual content (the gradient layers) changed. -->
      <div id="ring1" class="hidden absolute inset-0 rounded-full overflow-hidden">
        <div class="absolute inset-[-25%] call-gradient call-gradient-rotate"></div>
      </div>
      <div id="ring2" class="hidden absolute inset-0 rounded-full overflow-hidden">
        <div class="absolute inset-[-25%] call-gradient call-gradient-breathe"></div>
      </div>

      <button
        id="micButton"
        type="button"
        aria-label="Connect call"
        class="relative z-10 w-24 h-24 rounded-full bg-neutral-800 border border-neutral-700 flex items-center justify-center
               text-neutral-300 shadow-xl transition-all duration-300 ease-out
               hover:scale-105 active:scale-95
               focus:outline-none focus:ring-2 focus:ring-[var(--periwinkle-soft)] disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <!-- Mic icon (SVG, swaps to a "hang up" icon while connected) -->
        <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
      </button>
    </div>

    <p id="helperText" class="text-xs text-neutral-500 text-center max-w-56">
      Tap the microphone to start a live call with Cora.
    </p>

    <!-- Inline error banner (hidden unless something goes wrong) -->
    <div id="errorBanner" class="hidden w-full text-center text-xs text-[var(--fail-fg)] bg-[var(--fail-bg)] border border-[#F3B8B8] rounded-lg px-3 py-2"></div>
  </main>

  <script>
    // Local dev hits the local backend; everywhere else hits the deployed one.
    window.CORAFONE_API_BASE =
      (location.hostname === "localhost" || location.hostname === "127.0.0.1")
        ? "http://127.0.0.1:8000"
        : "https://corafone-demo.onrender.com";
  </script>
  <script src="app.js"></script>
</body>
</html>
